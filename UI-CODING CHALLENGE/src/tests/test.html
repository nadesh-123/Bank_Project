<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Station Management Dashboard</title>
    
    <!-- Your Requested Bootstrap 5.3.8 CSS CDN -->
     <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    
    <!-- Cloudflare cdnjs Alternative for Icons (Fixes loading issues) -->
    <link rel="stylesheet" href="https://cloudflare.com">
    
    <!-- Custom Style Sheet -->
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-light min-vh-100 d-flex flex-column p-3">

    <!-- Production Navbar with CMS Logo & Link -->
    <header class="navbar navbar-expand-lg bg-white shadow-sm border border-light rounded-3 px-4 py-3 mb-3 d-flex justify-content-between align-items-center">
        <div class="d-flex align-items-center gap-3">
            <!-- Brand CMS Logo Graphic Wrapper -->
            <div class="cms-logo d-flex align-items-center justify-content-center fw-black bg-dark text-white rounded-2 px-3 py-1 font-monospace shadow-sm">
                CMS
            </div>
            <!-- Officer Onboard Active Link -->
            <a href="#" class="navbar-link fw-bold text-dark fs-5 tracking-tight text-decoration-none transition-all">
                Officer Onboard
            </a>
        </div>
        <div class="d-flex align-items-center gap-3">
            <span class="badge bg-dark bg-opacity-10 text-dark font-monospace px-3 py-2 border border-dark border-opacity-10">&lt;NavbarStationHead /&gt;</span>
        </div>
    </header>

    <!-- App Shell Container -->
    <div class="d-flex flex-grow-1 gap-3 align-items-stretch">
        
        <!-- Sidebar Navigation -->
        <aside class="sidebar bg-white border border-light shadow-sm rounded-3 p-3 d-flex flex-column justify-content-between">
            <div class="w-100">
                <!-- Profile Block Card -->
                <div class="profile-card border border-light bg-light bg-opacity-50 rounded-3 p-3 text-center d-flex flex-column align-items-center shadow-sm">
                    <div class="avatar bg-primary text-white shadow-sm rounded-circle d-flex align-items-center justify-content-center fw-bold fs-5 mb-2 position-relative">
                        SH
                        <span class="position-absolute bottom-0 end-0 p-1 bg-success border border-2 border-white rounded-circle"></span>
                    </div>
                    <div class="profile-info">
                        <h2 class="fs-6 fw-bold text-dark mb-1">Jack Murphy</h2>
                        <span class="badge bg-secondary bg-opacity-10 text-secondary border border-secondary border-opacity-10 mb-2 px-2 py-1 fs-8">Station Head</span>
                        <p class="text-muted d-flex align-items-center justify-content-center gap-1 mb-0 small">
                            <i class="bi bi-geo-alt-fill text-danger fs-7"></i> Kensington Oval
                        </p>
                    </div>
                    <button class="btn btn-outline-dark btn-sm w-100 fw-semibold rounded-2 mt-3 fs-7 transition-all">
                        <i class="bi bi-pencil-square me-1"></i>Edit Profile
                    </button>
                </div>
            </div>
            
            <!-- Wireframe Tag Indicator -->
            <div class="text-center mt-3">
                <span class="badge bg-dark bg-opacity-10 text-dark font-monospace px-3 py-2 border border-dark border-opacity-10 d-inline-block">&lt;Sidebar /&gt;</span>
            </div>
        </aside>

        <!-- Central Working Page -->
        <main class="dashboard-content flex-grow-1 bg-white border border-light shadow-sm rounded-3 p-4">
            <div class="widget-container border border-dashed rounded-4 p-4 h-100 d-flex flex-column justify-content-between position-relative">
                
                <!-- Metrics Summary Grid Row -->
                <div class="row row-cols-1 row-cols-md-3 g-3 justify-content-center mb-4 w-100 mx-auto">
                    <!-- Officers Metric Card -->
                    <div class="col" style="max-width: 200px;">
                        <div class="metric-card p-3 bg-white border border-light shadow-sm rounded-3 d-flex align-items-center gap-3">
                            <div class="metric-icon bg-info bg-opacity-10 text-info rounded-3 p-2 fs-4 d-flex align-items-center justify-content-center">
                                <i class="bi bi-people-fill"></i>
                            </div>
                            <div>
                                <h3 class="text-muted fs-7 text-uppercase tracking-wider mb-0 fw-semibold">Officers</h3>
                                <p class="fs-3 fw-bold text-dark mb-0 leading-none">34</p>
                            </div>
                        </div>
                    </div>
                    <!-- Incidents Metric Card -->
                    <div class="col" style="max-width: 200px;">
                        <div class="metric-card p-3 bg-white border border-light shadow-sm rounded-3 d-flex align-items-center gap-3">
                            <div class="metric-icon bg-danger bg-opacity-10 text-danger rounded-3 p-2 fs-4 d-flex align-items-center justify-content-center">
                                <i class="bi bi-exclamation-triangle-fill"></i>
                            </div>
                            <div>
                                <h3 class="text-muted fs-7 text-uppercase tracking-wider mb-0 fw-semibold">Incidents</h3>
                                <p class="fs-3 fw-bold text-dark mb-0 leading-none">245</p>
                            </div>
                        </div>
                    </div>
                    <!-- Station Metric Card -->
                    <div class="col" style="max-width: 200px;">
                        <div class="metric-card p-3 bg-white border border-light shadow-sm rounded-3 d-flex align-items-center gap-3">
                            <div class="metric-icon bg-success bg-opacity-10 text-success rounded-3 p-2 fs-4 d-flex align-items-center justify-content-center">
                                <i class="bi bi-building-fill"></i>
                            </div>
                            <div>
                                <h3 class="text-muted fs-7 text-uppercase tracking-wider mb-0 fw-semibold">Station</h3>
                                <p class="fs-3 fw-bold text-dark mb-0 leading-none">8</p>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Data Visualization Cards -->
                <div class="row justify-content-center align-items-stretch flex-grow-1 g-4 my-2">
                    <!-- Officers Data Box -->
                    <div class="col-12 col-md-5 col-xl-4 d-flex">
                        <div class="data-box flex-grow-1 border border-light bg-light bg-opacity-20 shadow-sm rounded-3 p-4 d-flex flex-column justify-content-between">
                            <div class="d-flex align-items-center justify-content-between mb-3 border-bottom pb-2 border-light">
                                <h4 class="fs-6 fw-bold text-dark mb-0">Officer Distribution</h4>
                                <i class="bi bi-bar-chart-line text-muted"></i>
                            </div>
                            <div class="d-flex flex-column justify-content-center align-items-center flex-grow-1 text-center py-4">
                                <div class="chart-mock-circle d-flex align-items-center justify-content-center mb-2">
                                    <i class="bi bi-pie-chart text-primary opacity-50 fs-2"></i>
                                </div>
                                <span class="text-secondary small fw-medium">Officer per Station</span>
                            </div>
                        </div>
                    </div>
                    
                    <!-- Incidents Data Box -->
                    <div class="col-12 col-md-5 col-xl-4 d-flex">
                        <div class="data-box flex-grow-1 border border-light bg-light bg-opacity-20 shadow-sm rounded-3 p-4 d-flex flex-column justify-content-between">
                            <div class="d-flex align-items-center justify-content-between mb-3 border-bottom pb-2 border-light">
                                <h4 class="fs-6 fw-bold text-dark mb-0">Incident Rates</h4>
                                <i class="bi bi-graph-up-arrow text-muted"></i>
                            </div>
                            <div class="d-flex flex-column justify-content-center align-items-center flex-grow-1 text-center py-4">
                                <div class="chart-mock-circle d-flex align-items-center justify-content-center mb-2">
                                    <i class="bi bi-activity text-danger opacity-50 fs-2"></i>
                                </div>
                                <span class="text-secondary small fw-medium">Incident per station</span>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Floating Code Tag -->
                <div class="text-end w-100 pt-3">
                    <span class="badge bg-dark bg-opacity-10 text-dark font-monospace px-3 py-2 border border-dark border-opacity-10 d-inline-block">&lt;Widget /&gt;</span>
                </div>
            </div>
        </main>

    </div>

</body>
</html>
